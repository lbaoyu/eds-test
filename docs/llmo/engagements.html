<title>LLM Optimizer — Accelerator Portfolio</title>
<style>

    --red:#FA0F00;
    --red-dark:#C4090B;

    --bg:#F4F4F2;
    --surface:#FFFFFF;
    --surface-2:#FAFAF8;
    --line:#E4E4E0;
    --line-soft:#EDEDEA;
    --text:#1E1E1E;
    --text-2:#57574F;
    --text-3:#8B8B84;

    --cpl-active:#12805C;
    --active:#B4690E;
    --cpl:#0B63CE;
    --cpl-can:#7A3FD6;
    --on-hold:#6E6E6A;
    --can:#C0362E;
    --none:#A6A69F;

  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  @media (prefers-reduced-motion:reduce){
    html{ scroll-behavior:auto; }
    *{ transition:none !important; animation:none !important; }
  }

  body{
    margin:0;
    background:
      radial-gradient(1000px 480px at 12% -8%, #FBFBF9 0%, transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:"Adobe Clean","Helvetica Neue",Arial,sans-serif;
    font-variant-numeric:tabular-nums;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{ max-width:1160px; margin:0 auto; padding:34px 28px 72px; }

  /* Header */
  .masthead{ display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:26px; }
  .eyebrow{ display:flex; align-items:center; gap:9px; margin-bottom:10px; }
  .eyebrow .adobe{ color:var(--red); font-weight:800; font-size:15.5px; }
  .eyebrow .bar{ width:1px; height:13px; background:var(--line); }
  .eyebrow .product{ color:var(--text-3); font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.16em; }
  h1{ margin:0; font-size:33.5px; font-weight:800; letter-spacing:-.02em; color:var(--text); }
  .masthead .meta{ text-align:right; font-size:14px; color:var(--text-3); line-height:1.7; }
  .masthead .meta strong{ color:var(--text-2); font-weight:700; }
  .masthead .meta a{ color:var(--red-dark); text-decoration:none; }
  .masthead .meta a:hover{ text-decoration:underline; }

  /* KPI strip */
  .kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px; }
  .kpi{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:18px 18px 16px; position:relative; overflow:hidden; box-shadow:var(--shadow);
  }
  .kpi::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--red); }
  .kpi.k-live::before{ background:var(--cpl-active); }
  .kpi.k-pipeline::before{ background:var(--cpl); }
  .kpi.k-risk::before{ background:var(--can); }
  .kpi .val{ font-size:38px; font-weight:800; letter-spacing:-.02em; line-height:1; color:var(--text); }
  .kpi .lbl{ margin-top:8px; font-size:13.5px; color:var(--text-2); font-weight:700; }
  .kpi .sub{ margin-top:3px; font-size:12.5px; color:var(--text-3); }

  /* Pipeline */
  .pipeline{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:18px 20px 16px; margin-bottom:14px; box-shadow:var(--shadow);
  }
  .pipeline-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .pipeline-top h2{ margin:0; font-size:13.5px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-3); }
  .pipeline-top .hint{ font-size:13px; color:var(--text-3); }
  .track{ display:flex; height:14px; border-radius:7px; overflow:hidden; background:var(--bg); border:1px solid var(--line-soft); }
  .track .seg{ height:100%; border:none; padding:0; cursor:pointer; min-width:3px; transition:opacity .14s ease; }
  .track .seg:hover{ opacity:.82; }
  .track .seg:focus-visible{ outline:2px solid var(--text); outline-offset:2px; }
  .track .seg.dimmed{ opacity:.24; }

  /* Controls */
  .controls{ display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin:20px 0 18px; }
  .search-wrap{ position:relative; flex:1 1 260px; min-width:220px; }
  .search-wrap svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); pointer-events:none; }
  #search{
    width:100%; padding:11px 14px 11px 38px; border-radius:11px;
    border:1px solid var(--line); background:var(--surface); color:var(--text);
    font-size:15.5px; font-family:inherit; box-shadow:var(--shadow);
  }
  #search::placeholder{ color:var(--text-3); }
  #search:focus-visible{ outline:2px solid var(--red); outline-offset:1px; border-color:transparent; }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    display:inline-flex; align-items:center; gap:7px; padding:8px 13px; border-radius:999px;
    border:1px solid var(--line); background:var(--surface); color:var(--text-2);
    font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; white-space:nowrap;
  }
  .chip:hover{ border-color:var(--text-3); color:var(--text); }
  .chip .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .chip[aria-pressed="true"]{ background:var(--surface-2); color:var(--text); border-color:var(--text-2); }
  .chip.all[aria-pressed="true"]{ background:var(--red); border-color:var(--red); color:#fff; }
  .chip:focus-visible{ outline:2px solid var(--red); outline-offset:1px; }
  .reset-btn{
    font-size:14px; font-weight:600; color:var(--text-3); background:none; border:none;
    cursor:pointer; text-decoration:underline; font-family:inherit; padding:6px 4px;
  }
  .reset-btn:hover{ color:var(--red-dark); }

  .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  /* Regions */
  .region{ margin-bottom:30px; }
  .region-head{ display:flex; align-items:baseline; gap:12px; margin:0 2px 14px; padding-bottom:10px; border-bottom:1px solid var(--line); }
  .region-head h2{ margin:0; font-size:18px; font-weight:800; letter-spacing:-.01em; color:var(--text); }
  .region-head .count{ font-size:13.5px; color:var(--text-3); font-weight:600; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:14px; }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:16px 16px 14px; position:relative; overflow:hidden; box-shadow:var(--shadow);
    transition:border-color .12s ease, box-shadow .12s ease;
  }
  .card:hover{ border-color:#D6D6D1; box-shadow:0 2px 4px rgba(20,20,20,.06), 0 8px 22px rgba(20,20,20,.06); }
  .card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; }
  .card.s-cpl-active::before{ background:var(--cpl-active); }
  .card.s-active::before{ background:var(--active); }
  .card.s-cpl::before{ background:var(--cpl); }
  .card.s-cpl-can::before{ background:linear-gradient(180deg, var(--cpl) 50%, var(--can) 50%); }
  .card.s-on-hold::before{ background:var(--on-hold); }
  .card.s-can::before{ background:var(--can); }
  .card.s-none::before{ background:var(--none); }

  .card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .card-name{ font-size:17px; font-weight:700; color:var(--text); line-height:1.3; }

  .badge{ display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12.5px; font-weight:700; white-space:nowrap; flex:none; }
  .badge .dot{ width:7px; height:7px; border-radius:50%; }
  .badge.s-cpl-active{ background:rgba(18,128,92,.11); color:var(--cpl-active); }
  .badge.s-cpl-active .dot{ background:var(--cpl-active); }
  .badge.s-active{ background:rgba(180,105,14,.11); color:var(--active); }
  .badge.s-active .dot{ background:var(--active); }
  .badge.s-cpl{ background:rgba(11,99,206,.10); color:var(--cpl); }
  .badge.s-cpl .dot{ background:var(--cpl); }
  .badge.s-cpl-can{ background:rgba(122,63,214,.11); color:var(--cpl-can); }
  .badge.s-cpl-can .dot{ background:linear-gradient(90deg, var(--cpl) 50%, var(--can) 50%); }
  .badge.s-on-hold{ background:rgba(110,110,106,.13); color:#5C5C58; }
  .badge.s-on-hold .dot{ background:var(--on-hold); }
  .badge.s-can{ background:rgba(192,54,46,.10); color:var(--can); }
  .badge.s-can .dot{ background:var(--can); }
  .badge.s-none{ background:rgba(166,166,159,.16); color:var(--text-3); border:1px dashed #CFCFC9; }
  .badge.s-none .dot{ background:var(--none); }

  .card-foot{ margin-top:14px; padding-top:12px; border-top:1px solid var(--line-soft); }
  .tasks .tasks-label{ font-size:12.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-3); }
  .tasks ul{ list-style:none; margin:9px 0 0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .tasks li{ display:flex; gap:8px; font-size:13.5px; line-height:1.4; }
  .tasks li .marker{ color:var(--text-3); flex:none; }
  .tasks a{ color:var(--text-2); text-decoration:none; }
  .tasks a:hover{ color:var(--red-dark); text-decoration:underline; }
  .card.no-tasks .card-foot .lead{ font-size:13.5px; color:var(--text-3); }

  .empty{
    grid-column:1/-1; text-align:center; padding:52px 24px;
    background:var(--surface); border:1px dashed var(--line); border-radius:14px; color:var(--text-3);
  }
  .empty strong{ display:block; color:var(--text); font-size:17px; margin-bottom:6px; }
  .empty button{ margin-top:14px; font-family:inherit; font-size:14.5px; font-weight:700; background:var(--red); color:#fff; border:none; padding:9px 16px; border-radius:9px; cursor:pointer; }
  .empty button:hover{ background:var(--red-dark); }

  footer{ margin-top:8px; font-size:13.5px; color:var(--text-3); text-align:center; }
  footer .src{ opacity:.85; }

  @media (max-width:860px){ .kpis{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:560px){
    .wrap{ padding:24px 16px 56px; }
    h1{ font-size:27px; }
    .masthead .meta{ text-align:left; }
    .grid{ grid-template-columns:1fr; }
  }
</style>
</head>

  function h(tag, attrs, kids){
    var e = document.createElement(tag);
    attrs = attrs || {};
    for (var k in attrs){
      var v = attrs[k];
      if (v == null) continue;
      if (k === "class") e.className = v;
      else if (k.indexOf("on") === 0 && typeof v === "function") e.addEventListener(k.slice(2), v);
      else e.setAttribute(k, v);
    }
    (kids||[]).forEach(function(c){
      if (c == null) return;
      e.appendChild(c.nodeType ? c : document.createTextNode(String(c)));

      { cls:"", val:TOTAL, lbl:"Customers", sub:REGIONS.length + " regions" },
      { cls:"k-live", val:live, lbl:"Live engagements", sub:"CPL+Active & Active" },
      { cls:"k-pipeline", val:pipeline, lbl:"In pipeline", sub:"CPL, not yet active" },
      { cls:"k-risk", val:risk, lbl:"Stalled / at risk", sub:"On hold, cancelled, not started" }
    ];
    var el = document.getElementById("kpis");
    el.innerHTML = "";
    tiles.forEach(function(t){
      el.appendChild(h("div", { class:"kpi " + t.cls }, [
        h("div", { class:"val" }, [String(t.val)]),
        h("div", { class:"lbl" }, [t.lbl]),
        h("div", { class:"sub" }, [t.sub])
      ]));
    });
  }

  function renderTrack(){
    var c = counts();
    var track = document.getElementById("track");
    track.innerHTML = "";
    var sel = state.statuses.size > 0;
    ORDER.forEach(function(key){
      var n = c[key]; if (!n) return;
      var pct = (n / TOTAL) * 100;
      var dim = sel && !state.statuses.has(key);
      track.appendChild(h("button", {
        type:"button",
        class:"seg" + (dim ? " dimmed" : ""),
        style:"width:" + pct + "%;background:var(--" + key + ")",
        title:META[key].label + ": " + n + " (" + Math.round(pct) + "%)",
        "aria-label":META[key].label + ", " + n + " customers",
        "aria-pressed": state.statuses.has(key) ? "true" : "false",
        onclick:function(){ toggle(key); }
      }, []));
    });
  }

  function renderChips(){
    var c = counts();
    var el = document.getElementById("chips");
    el.innerHTML = "";
    el.appendChild(h("button", {
      type:"button", class:"chip all",
      "aria-pressed": state.statuses.size === 0 ? "true" : "false",
      onclick: clearAll
    }, ["All " + TOTAL]));
    ORDER.forEach(function(key){
      var n = c[key]; if (!n) return;
      el.appendChild(h("button", {
        type:"button", class:"chip",
        "aria-pressed": state.statuses.has(key) ? "true" : "false",
        onclick:function(){ toggle(key); }
      }, [
        h("span", { class:"dot", style:"background:var(--" + key + ")" }, []),
        META[key].label + " " + n
      ]));
    });
  }

  function badge(status){
    return h("span", { class:"badge s-" + status }, [
      h("span", { class:"dot" }, []),
      META[status].label
    ]);
  }

  function taskBlock(c){
    if (!c.tasks.length){
      return h("span", { class:"lead" }, ["No accelerators logged"]);
    }
    var n = c.tasks.length;
    return h("div", { class:"tasks" }, [
      h("div", { class:"tasks-label" }, [ n + " accelerator" + (n===1?"":"s") ]),
      h("ul", {}, c.tasks.map(function(task){
        return h("li", {}, [
          h("span", { class:"marker" }, ["↳"]),
          h("a", { href: WF + task.id + "/", target:"_blank", rel:"noopener" }, [stripPrefix(task.t)])
        ]);
      }))
    ]);
  }

  function render(){
    renderKpis();
    renderTrack();
    renderChips();

    var main = document.getElementById("main");
    main.innerHTML = "";
    var shown = 0;

    REGIONS.forEach(function(region){
      var list = region.customers.filter(match);
      if (!list.length) return;
      shown += list.length;

      var label = list.length === region.customers.length
        ? list.length + " customer" + (list.length===1?"":"s")
        : list.length + " of " + region.customers.length;

      var grid = h("div", { class:"grid" }, list.map(function(c){
        return h("div", { class:"card s-" + c.status + (c.tasks.length ? "" : " no-tasks") }, [
          h("div", { class:"card-top" }, [
            h("div", { class:"card-name" }, [c.name]),
            badge(c.status)
          ]),
          h("div", { class:"card-foot" }, [ taskBlock(c) ])
        ]);
      }));

      main.appendChild(h("section", { class:"region", id:slug(region.name) }, [
        h("div", { class:"region-head" }, [
          h("h2", {}, [region.name]),
          h("span", { class:"count" }, [label])
        ]),
        grid
      ]));
    });

    if (!shown){
      main.appendChild(h("div", { class:"grid" }, [
        h("div", { class:"empty" }, [
          h("strong", {}, ["No customers match"]),
          "Adjust your search or clear the stage filters.",
          h("button", { type:"button", onclick: clearAll }, ["Clear filters"])
        ])
      ]));
    }

    document.getElementById("live").textContent = "Showing " + shown + " of " + TOTAL + " customers";
    document.getElementById("reset").hidden = !(state.query || state.statuses.size);
  }

  document.getElementById("search").addEventListener("input", function(e){
    state.query = e.target.value.trim().toLowerCase();
    render();
  });
  document.getElementById("reset").addEventListener("click", clearAll);

  render();
})();
</script>
</body>
</html>
