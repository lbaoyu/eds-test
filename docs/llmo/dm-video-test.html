<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Embedded Dynamic Media Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* Basic page styling */
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background-color: #f4f4f4;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .video-wrapper {
      max-width: 960px;
      width: 100%;
      padding: 16px;
      box-sizing: border-box;
    }

    .video-box {
      position: relative;
      width: 100%;
      /* 16:9 aspect ratio – adjust if needed */
      padding-bottom: 56.25%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .video-box iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0 0 12px;
      text-align: center;
    }

    .description {
      font-size: 0.95rem;
      margin-bottom: 12px;
      text-align: center;
      color: #555;
    }
  </style>
</head>

<body>
  <div class="video-wrapper">
    <h1>Dynamic Media Video Embed</h1>
    <p class="description">
      This video is embedded inside a responsive box using an iframe.
    </p>

    <div class="video-box">
      <iframe
        src="https://adobe-my.sharepoint.com/:v:/p/guptapawan/IQBGJEWhXpXyTZMZpwSVyhTFAbK7sNLenMoDQoOyvOmvamA?e=R4WjqU"
        title="Dynamic Media Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</body>
</html>
